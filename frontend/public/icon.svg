<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg-glow" cx="0.4" cy="0.45" r="0.65">
      <stop offset="0%" stop-color="#D49A82" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#C8856C" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="arc-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#D49A82"/>
      <stop offset="100%" stop-color="#A06B55"/>
    </linearGradient>
  </defs>

  <!-- Ambient glow -->
  <circle cx="256" cy="256" r="240" fill="url(#bg-glow)"/>

  <!-- Outer arc  widest echo wave -->
  <path d="M 180 380 A 175 175 0 0 1 180 132" stroke="#C8856C" stroke-width="18" stroke-linecap="round" fill="none" opacity="0.25"/>

  <!-- Middle arc -->
  <path d="M 215 345 A 125 125 0 0 1 215 167" stroke="#C8856C" stroke-width="22" stroke-linecap="round" fill="none" opacity="0.45"/>

  <!-- Inner arc -->
  <path d="M 250 310 A 75 75 0 0 1 250 202" stroke="url(#arc-grad)" stroke-width="26" stroke-linecap="round" fill="none" opacity="0.7"/>

  <!-- Core dot  the person / source -->
  <circle cx="290" cy="256" r="32" fill="url(#arc-grad)"/>
  <circle cx="282" cy="248" r="10" fill="white" opacity="0.15"/>
</svg>

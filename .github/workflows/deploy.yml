name: Deploy

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/echo-backend

jobs:
  deploy:
    name: Build & Deploy Backend
    runs-on: ubuntu-latest
    # Only run if the CI workflow succeeded
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Check out the commit that triggered the CI workflow
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # Tag with full git SHA
            type=sha,prefix=,format=long
            # Tag with short git SHA for convenience
            type=sha,prefix=sha-,format=short
            # Also tag as latest for main branch
            type=raw,value=latest,enable=true

      - name: Build and push backend Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Cache layers between builds for faster CI
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # =========================================================================
      # TODO: Add deployment step for your chosen platform
      # =========================================================================
      #
      # The image has been pushed to:
      #   ghcr.io/${{ github.repository }}/echo-backend:${{ github.event.workflow_run.head_sha }}
      #
      # Choose ONE of the following deployment options and uncomment it:
      #
      # -------------------------------------------------------------------------
      # OPTION A: Fly.io
      # -------------------------------------------------------------------------
      # Prerequisites:
      #   1. Install flyctl and run `fly launch` in the backend directory
      #   2. Add FLY_API_TOKEN to GitHub repository secrets
      #   3. Ensure fly.toml exists in backend/
      #
      # - name: Deploy to Fly.io
      #   uses: superfly/flyctl-actions/setup-flyctl@master
      # - run: flyctl deploy --remote-only --image ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.event.workflow_run.head_sha }}
      #   env:
      #     FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      #
      # -------------------------------------------------------------------------
      # OPTION B: Railway
      # -------------------------------------------------------------------------
      # Prerequisites:
      #   1. Create a Railway project and link to the GitHub repo
      #   2. Add RAILWAY_TOKEN to GitHub repository secrets
      #   3. Set the image source in Railway to use the GHCR image
      #
      # - name: Deploy to Railway
      #   run: |
      #     curl -fsSL https://railway.app/install.sh | sh
      #     railway up --service echo-backend --image ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.event.workflow_run.head_sha }}
      #   env:
      #     RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      #
      # -------------------------------------------------------------------------
      # OPTION C: SSH deployment to a VPS / bare-metal server
      # -------------------------------------------------------------------------
      # Prerequisites:
      #   1. Add SSH_HOST, SSH_USER, SSH_PRIVATE_KEY secrets to the repository
      #   2. Ensure Docker is installed on the target server
      #   3. The server must be able to pull from ghcr.io (log in with a PAT)
      #
      # - name: Deploy via SSH
      #   uses: appleboy/ssh-action@v1
      #   with:
      #     host: ${{ secrets.SSH_HOST }}
      #     username: ${{ secrets.SSH_USER }}
      #     key: ${{ secrets.SSH_PRIVATE_KEY }}
      #     script: |
      #       docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.event.workflow_run.head_sha }}
      #       docker stop echo-backend || true
      #       docker rm echo-backend || true
      #       docker run -d \
      #         --name echo-backend \
      #         --restart unless-stopped \
      #         -p 8000:8000 \
      #         --env-file /opt/echo/.env \
      #         ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.event.workflow_run.head_sha }}
      #
      # =========================================================================

      - name: Deployment summary
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Image pushed:** \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Git SHA:** \`${{ github.event.workflow_run.head_sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> ⚠️ **No deployment target configured.** Uncomment one of the TODO options in \`.github/workflows/deploy.yml\` to enable actual deployment." >> $GITHUB_STEP_SUMMARY

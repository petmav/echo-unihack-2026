name: CI

'on':
  push:
    branches:
      - main
  pull_request:

jobs:
  backend-lint:
    name: Backend Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ruff
        run: pip install ruff
      - name: Lint backend
        run: ruff check backend/

  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      PYTHONPATH: backend
      JWT_SECRET: test-secret-for-ci
      NANOGPT_API_KEY: ""
      ELASTIC_URL: ""
      ELASTIC_API_KEY: ""
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r backend/requirements.txt
      - name: Run tests (excluding integration)
        run: pytest backend/tests/ -m "not integration" -v --tb=short

  frontend-check:
    name: Frontend Type Check & Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: npm ci
      - name: TypeScript type check
        run: npm run typecheck
      - name: ESLint
        run: npm run lint

  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs:
      - backend-test
      - frontend-check
    env:
      CI: "true"
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Run Playwright tests
        run: npx playwright test
      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: |
            frontend/playwright-report/
            frontend/test-results/
          retention-days: 7

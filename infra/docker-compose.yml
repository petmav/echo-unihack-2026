# Echo - Docker Compose Configuration
# Mental health platform local development environment
#
# Services:
# - postgres: PostgreSQL database for user accounts and message mappings
# - ollama: Local SLM for anonymization (qwen3.5:0.8b)
# - backend: FastAPI server for thought processing pipeline
# - frontend: Next.js web application
#
# Note: Elasticsearch runs on Elastic Cloud (configured via env vars)
#       and is NOT included as a local container.

version: '3.8'

services:
  # ============================================================================
  # PostgreSQL Database
  # ============================================================================
  postgres:
    image: postgres:15-alpine
    container_name: echo-postgres
    environment:
      POSTGRES_USER: echo_user
      POSTGRES_PASSWORD: echo_password
      POSTGRES_DB: echo_db
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U echo_user -d echo_db"]
      interval: 10s
      timeout: 5s
      start_period: 10s
      retries: 5
    restart: unless-stopped
    networks:
      - echo-network

  # ============================================================================
  # Ollama Service - Local SLM for Anonymization
  # ============================================================================
  ollama:
    image: ollama/ollama:latest
    container_name: echo-ollama
    ports:
      - "11434:11434"
    volumes:
      # Persist downloaded models between container restarts
      - ollama-models:/root/.ollama
    restart: unless-stopped
    networks:
      - echo-network
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
    environment:
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_HF_TOKEN=${OLLAMA_HF_TOKEN:-}

  # ============================================================================
  # Elasticsearch Service - Local fallback (used when ELASTIC_CLOUD_ID is unset)
  # ============================================================================
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    container_name: echo-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health | grep -qv '\"status\":\"red\"'"]
      interval: 20s
      timeout: 10s
      start_period: 60s
      retries: 5
    restart: unless-stopped
    networks:
      - echo-network

  # ============================================================================
  # Backend Service - FastAPI Server
  # ============================================================================
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: echo-backend
    ports:
      - "8000:8000"
    environment:
      # These override .env because they must use Docker service hostnames
      - OLLAMA_HOST=http://ollama:11434
      - DATABASE_URL=postgresql://echo_user:echo_password@postgres:5432/echo_db
      # All other config (NANOGPT_API_KEY, ELASTIC_HOST, ELASTIC_API_KEY, etc.)
      # comes from env_file below
    env_file:
      - ../.env
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - echo-network
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health')"]
      interval: 15s
      timeout: 10s
      start_period: 30s
      retries: 5
    volumes:
      # Mount backend code for development hot-reload
      - ../backend:/app
      # Exclude Python cache
      - /app/__pycache__

  # ============================================================================
  # Frontend Service - Next.js Web Application (dev mode with hot-reload)
  # ============================================================================
  frontend:
    image: node:20-alpine
    container_name: echo-frontend
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NODE_ENV=development
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - echo-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/ || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 5
    volumes:
      - ../frontend:/app
      - /app/node_modules
      - /app/.next

# ============================================================================
# Networks
# ============================================================================
networks:
  echo-network:
    driver: bridge
    name: echo-network

# ============================================================================
# Volumes
# ============================================================================
volumes:
  postgres-data:
    name: echo-postgres-data
    driver: local
  ollama-models:
    name: echo-ollama-models
    driver: local
  elasticsearch-data:
    name: echo-elasticsearch-data
    driver: local

# ============================================================================
# Usage Instructions
# ============================================================================
#
# 1. First time setup - Pull the anonymizer model:
#    docker-compose exec ollama ollama pull qwen3.5:0.8b
#
# 2. Start all services:
#    docker-compose up -d
#
# 3. View logs:
#    docker-compose logs -f backend
#    docker-compose logs -f ollama
#    docker-compose logs -f frontend
#
# 4. Stop all services:
#    docker-compose down
#
# 5. Stop and remove volumes (WARNING: deletes Ollama models and DB data):
#    docker-compose down -v
#
# 6. Rebuild backend after code changes:
#    docker-compose build backend && docker-compose up -d backend
#
# ============================================================================
# Privacy Reminders
# ============================================================================
#
# - The backend service NEVER logs raw thought text (see middleware/logging.py)
# - Ollama runs the anonymizer FIRST - raw text is discarded immediately
# - NanoGPT API (via NANOGPT_API_KEY) only receives anonymized text
# - Elasticsearch (Elastic Cloud) stores anonymized thoughts with NO user IDs
# - All privacy constraints are enforced in the application layer
# - Startup order: postgres → ollama → backend → frontend (enforced via health checks)
#
